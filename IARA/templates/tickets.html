{% extends 'index.html' %}

{% block content %}
<div class="form-container" style="max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 40px auto; font-family: Arial, sans-serif;">
    <h2 style="margin-top: 0;">Издаване на любителски риболовен билет</h2>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div style="padding: 10px; background-color: #d4edda; color: #155724; border-radius: 4px; margin-bottom: 15px;">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/buy-ticket" method="POST">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Три имена:</label>
            <input type="text" name="holder_name" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">ЕГН:</label>
            <input type="text" name="holder_egn" maxlength="10" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Срок на билета:</label>
            <select name="ticket_type" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                <option value="Седмичен">Седмичен (4.00 лв.)</option>
                <option value="Месечен">Месечен (8.00 лв.)</option>
                <option value="Годишен">Годишен (25.00 лв.)</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Категория:</label>
            <select name="category" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                <option value="Стандартен">Стандартен</option>
                <option value="Под 14г">Дете под 14г (Безплатно)</option>
                <option value="Пенсионер">Пенсионер (50% намаление)</option>
                <option value="ТЕЛК">Лице с увреждания /ТЕЛК/ (Безплатно)</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Номер на ТЕЛК решение (ако е приложимо):</label>
            <input type="text" name="telk_number" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <button type="submit" style="background-color: #2ecc71; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px;">Запиши и издай билет</button>
    </form>
</div>
{% endblock %}
