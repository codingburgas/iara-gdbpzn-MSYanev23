{% extends 'index.html' %}

{% block content %}
<div class="container">
    <div class="content-card" style="max-width: 600px; margin: 20px auto;">
        <h3 class="section-title" style="text-align: left; margin-bottom: 20px;">Издаване на любителски риболовен билет</h3>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div style="padding: 12px; background-color: #d4edda; color: #155724; border-radius: 4px; margin-bottom: 20px; font-weight: 600;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/buy-ticket" method="POST">
            <div class="form-group">
                <label class="form-label">Три имена</label>
                <input type="text" name="holder_name" required class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">ЕГН</label>
                <input type="text" name="holder_egn" maxlength="10" required class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Срок на билета</label>
                <select name="ticket_type" class="form-input" style="background-color: white;">
                    <option value="Седмичен">Седмичен (4.00 лв.)</option>
                    <option value="Месечен">Месечен (8.00 лв.)</option>
                    <option value="Годишен">Годишен (25.00 лв.)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Категория</label>
                <select name="category" class="form-input" style="background-color: white;">
                    <option value="Стандартен">Стандартен</option>
                    <option value="Под 14г">Дете под 14г (Безплатно)</option>
                    <option value="Пенсионер">Пенсионер (50% намаление)</option>
                    <option value="ТЕЛК">Лице с увреждания /ТЕЛК/ (Безплатно)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Номер на ТЕЛК решение (ако е приложимо)</label>
                <input type="text" name="telk_number" class="form-input">
            </div>

            <button type="submit" class="btn-navy" style="border: none; width: 100%;">Запиши и издай билет</button>
        </form>
    </div>
</div>
{% endblock %}
